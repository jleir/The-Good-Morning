<!DOCTYPE html>
<html lang="en">
<head>
    <!-- basic meta -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- title -->
    <title>The Good Morning</title>

    <!-- description -->
    <meta name="description" content="---">

    <!-- theme color -->
    <meta name="theme-color" content="#000000">

    <!-- open graph (main share preview) -->
    <meta property="og:title" content="The Good Morning">
    <meta property="og:description" content="description that will be on the share link">
    <meta property="og:image" content="hey send me the image that will be on the share link hey">
    <meta property="og:type" content="website">

    <!-- twitter (share preview) -->
    <meta name="twitter:title" content="The Good Morning">
    <meta name="twitter:description" content="---">
    <meta name="twitter:image" content="---">

    <!-- favicon -->
    <link rel="icon" href="images/flavicon.png" type="image/png">

    <style>
        /* fonts */
        @font-face { font-family: "times"; src: url("fonts/times.ttf") format("truetype"); }
        @font-face { font-family: "AncientEgyptian"; src: url("fonts/AncientEgyptianHieroglyphs.otf") format("opentype"); }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            font-family: Arial, sans-serif;
            color: black;
            text-align: center;
            overflow: hidden;
            background-color: #fff;
        }

        /* disable image interaction */
        img {
            user-select: none;
            -webkit-user-drag: none;
            pointer-events: none;
        }

        /* video background */
        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
            opacity: 0.8;
            transition: opacity 2s ease;
        }

        .hidden { opacity: 0; }

        /* rotating logo */
        @keyframes girar {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .logo {
            margin-top: 10px;
            z-index: 1;
        }

        .logo img {
            width: 250px;
            animation: girar 30s linear infinite;
        }

        /* title text */
        .aero {
            margin-top: -30px;
            z-index: 10;
        }

        .aero p {
            font-size: 30px;
            font-family: "AncientEgyptian";
            font-weight: 500;
        }

        /* main content */
        .content {
            margin-top: 50px;
            padding: 55px;
            z-index: 1;
        }

        .content p {
            font-size: 21px;
            line-height: 1.5;
            font-family: "times";
            white-space: nowrap;
            color: black;
        }

        .link-text {
            text-decoration: none;
            color: inherit;
            cursor: pointer;
            transition: opacity 0.3s ease;
            pointer-events: auto;
        }

        .link-text:hover { opacity: 0.8; }

        /* bottom icon */
        .bottom-icon {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
        }

        .bottom-icon img { width: 75px; }

        /* music button */
        .music-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 3;
            cursor: pointer;
            pointer-events: auto;
        }

        .music-btn img {
            width: 28px;
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }

        /* mobile adjustments */
        @media (max-width: 768px) {
            .logo img { width: 180px; }
            .content p { 
                white-space: normal; 
                font-size: 18px;
            }
            .aero { margin-top: -15px; }
            .bottom-icon img { width: 60px; }
        }
    </style>
</head>

<body>
    <video id="video1" class="video-bg" muted playsinline autoplay>
        <source src="images/background.mp4" type="video/mp4">
    </video>
    <video id="video2" class="video-bg hidden" muted playsinline autoplay>
        <source src="images/background.mp4" type="video/mp4">
    </video>

    <div class="music-btn" onclick="toggleMusic()">
        <img id="musicIcon" src="images/play.png" alt="play">
    </div>

    <audio id="music" loop>
        <source src="images/日本の空気.mp3" type="audio/mpeg">
    </audio>

    <div class="logo">
        <img src="images/logo.png" alt="logo" draggable="false">
    </div>

    <div class="aero">
        <p>SAKINA</p>
    </div>

    <div class="content">
        <p>
            <a href="page2.html" class="link-text">
                Good Morning.<br>
                This website is currently under construction. Please come back soon.
            </a>
        </p>
    </div>

    <div class="bottom-icon">
        <img src="images/icon.png" alt="icon" draggable="false">
    </div>

    <script>
        const v1 = document.getElementById("video1");
        const v2 = document.getElementById("video2");
        let active = v1;
        let next = v2;

        // video loop swap
        function startLoop() {
            active.play();
            active.addEventListener("timeupdate", () => {
                const remaining = active.duration - active.currentTime;
                if (remaining < 2 && next.paused) {
                    next.currentTime = 0;
                    next.play();
                    next.classList.remove("hidden");
                    active.classList.add("hidden");
                    [active, next] = [next, active];
                }
            });
        }
        startLoop();

        const music = document.getElementById("music");
        const icon = document.getElementById("musicIcon");

        // restore music state
        window.addEventListener("load", () => {
            const musicTime = sessionStorage.getItem("musicTime");
            const isPlaying = sessionStorage.getItem("musicPlaying");
            if (musicTime) music.currentTime = parseFloat(musicTime);
            if (isPlaying === "true") {
                music.play().then(() => icon.src = "images/pause.png").catch(() => {});
            }
        });

        // save music time
        setInterval(() => {
            if (!music.paused) sessionStorage.setItem("musicTime", music.currentTime);
        }, 1000);

        // toggle music
        function toggleMusic() {
            if (music.paused) {
                music.play();
                icon.src = "images/pause.png";
                sessionStorage.setItem("musicPlaying", "true");
            } else {
                music.pause();
                icon.src = "images/play.png";
                sessionStorage.setItem("musicPlaying", "false");
            }
        }

        // save before leaving
        window.addEventListener("beforeunload", () => {
            sessionStorage.setItem("musicTime", music.currentTime);
        });
    </script>
</body>
</html>
